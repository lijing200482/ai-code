server:
  port: 8445
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000

spring:
  application:
    name: ai-code-father
  profiles:
    active: local
  session:
    store-type: redis
    timeout: 2592000


# spring doc
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.zijing.aicode.controller

knife4j:
  enable: true
  setting:
    language: zh_cn


