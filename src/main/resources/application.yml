server:
  port: 8445
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000

spring:
  application:
    name: ai-code-father
  profiles:
    active: local
  session:
    store-type: redis
    timeout: 2592000
  datasource:
    url: jdbc:mysql://localhost:3306/ai_code?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3600


# spring doc
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.zijing.aicode.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

# langchain4j community redis
langchain4j:
  community:
    redis:
      host: localhost
      port: 6379
      ttl-seconds: 1800

